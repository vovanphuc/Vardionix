  # =======================================================

  # --- Mass Assignment ---

  - id: javascript.security.mass-assignment.spread-body
    patterns:
      - pattern-either:
          - pattern: $MODEL.create({...$REQ.body})
          - pattern: $MODEL.update({...$REQ.body})
          - pattern: new $MODEL({...$REQ.body})
    message: >
      Spreading request body directly into model creation or update enables
      mass assignment. Attackers can set privileged fields (role, isAdmin).
      Explicitly pick only allowed fields from the request body.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: ["CWE-915"]
      owasp: ["A04:2021"]
      confidence: HIGH
    options:
      symbolic_propagation: true

  # --- Unvalidated File Upload ---

  - id: python.security.upload.save-without-validation
    pattern: |
      $FILE.save($PATH)
    message: >
      Saving uploaded file without validating filename, extension, or content
      type. Validate file type against an allowlist, generate a safe filename,
      and scan for malicious content before saving.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: ["CWE-434"]
      owasp: ["A04:2021"]
      confidence: MEDIUM

  # --- Code Injection via eval/exec ---

  - id: python.security.injection.dynamic-code
    patterns:
      - pattern-either:
          - pattern: eval($INPUT)
          - pattern: compile($INPUT, ...)
      - pattern-not: ast.literal_eval($INPUT)
    message: >
      eval()/compile() with dynamic input enables arbitrary code execution.
      Use ast.literal_eval() for safe evaluation of data literals, or avoid
      dynamic code evaluation entirely.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-95"]
      owasp: ["A03:2021"]
      confidence: HIGH
    options:
      symbolic_propagation: true

  # --- LDAP Injection ---

  - id: python.security.ldap.injection
    patterns:
      - pattern-either:
          - pattern: $CONN.search_s(..., $FILTER + ..., ...)
          - pattern: $CONN.search(..., $FILTER.format(...), ...)
    message: >
      LDAP filter built with string concatenation or formatting enables
      LDAP injection. Use parameterized LDAP queries or escape special
      characters with ldap.filter.escape_filter_chars().
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-90"]
      owasp: ["A03:2021"]
      confidence: HIGH

  # --- Header Injection ---

  - id: javascript.security.header-injection.set-header
    patterns:
      - pattern-either:
          - pattern: $RES.setHeader($NAME, $INPUT)
          - pattern: $RES.header($NAME, $INPUT)
      - metavariable-regex:
          metavariable: $NAME
          regex: (?i).*(location|redirect|set-cookie|x-forwarded).*
    message: >
      Setting HTTP headers with user-controlled values may enable header
      injection or response splitting. Validate and sanitize header values,
      removing newline characters.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: ["CWE-113"]
      owasp: ["A03:2021"]
      confidence: MEDIUM

  # --- Unsafe Regex from User Input ---

  - id: javascript.security.redos.user-regex
    patterns:
      - pattern: new RegExp($INPUT)
      - pattern-not: new RegExp("...")
    message: >
      Creating a RegExp from user input may cause ReDoS or regex injection.
      Escape special characters with a utility function or use a fixed
      set of allowed patterns.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: ["CWE-1333"]
      confidence: MEDIUM

  - id: python.security.redos.user-regex
    patterns:
      - pattern: re.compile($INPUT)
      - pattern-not: re.compile("...")
    message: >
      Compiling user-controlled input as a regex may cause ReDoS or regex
      injection. Escape input with re.escape() or use a fixed set of
      allowed patterns.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: ["CWE-1333"]
      confidence: MEDIUM

  # --- Session Fixation ---

  - id: javascript.security.session.no-regenerate
    pattern: |
      $REQ.session.$KEY = $VAL
    message: >
      Setting session values (e.g., after login) without regenerating the
      session ID may enable session fixation attacks. Call
      req.session.regenerate() before setting authenticated session data.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: ["CWE-384"]
      owasp: ["A07:2021"]
      confidence: MEDIUM

  # --- Server-Side Template Injection ---

  - id: python.security.ssti.jinja2-from-string
    patterns:
      - pattern-either:
          - pattern: Template($INPUT).render(...)
          - pattern: $ENV.from_string($INPUT).render(...)
    message: >
      Creating Jinja2 templates from user-controlled strings enables
      Server-Side Template Injection (SSTI). Use render_template() with
      static template files and pass variables via context.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-1336"]
      owasp: ["A03:2021"]
      confidence: HIGH
    options:
      symbolic_propagation: true

  # --- Information Disclosure via Error Messages ---

  - id: javascript.security.info-disclosure.stack-trace-response
    patterns:
      - pattern-either:
          - pattern: $RES.send($ERR.stack)
          - pattern: "$RES.json({..., stack: $ERR.stack, ...})"
          - pattern: $RES.status(...).send($ERR.message)
    message: >
      Sending error stack traces or detailed error messages to clients
      exposes internal implementation details. Return generic error
      messages to clients and log details server-side.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: ["CWE-209"]
      owasp: ["A09:2021"]
      confidence: HIGH

  # --- Unsafe JSON Parse via eval ---

  - id: javascript.security.injection.eval-json
    pattern-regex: "eval\\s*\\(\\s*['\"]?\\(\\s*['\"]?\\s*\\+\\s*"
    message: >
      Using eval() to parse JSON enables arbitrary code injection. Always
      use JSON.parse() instead. Never wrap user input in eval().
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: ["CWE-95"]
      owasp: ["A03:2021"]
      confidence: HIGH

  # --- Go HTTP handler without timeout ---

  - id: go.security.dos.server-no-timeout
    pattern: |
      &http.Server{..., ReadTimeout: 0, ...}
    message: >
      HTTP server with ReadTimeout of 0 has no read deadline, making it
      vulnerable to slowloris denial-of-service attacks. Set ReadTimeout,
      WriteTimeout, and IdleTimeout to reasonable values.
    languages: [go]
    severity: WARNING
    metadata:
      cwe: ["CWE-400"]
      owasp: ["A05:2021"]
      confidence: MEDIUM

  # --- PHP Dangerous Functions ---

  - id: php.security.injection.assert-string
    pattern: |
      assert($INPUT)
    message: >
      PHP assert() with string argument evaluates it as PHP code (PHP < 8.0).
      This enables code injection if $INPUT is user-controlled.
      Use strict boolean assertions or upgrade to PHP 8.0+.
    languages: [php]
    severity: ERROR
    metadata:
      cwe: ["CWE-95"]
      owasp: ["A03:2021"]
      confidence: MEDIUM

  - id: php.security.injection.preg-replace-eval
    pattern-regex: "preg_replace\\s*\\(\\s*['\"][^'\"]*e['\"]"
    message: >
      preg_replace() with the /e modifier evaluates the replacement string
      as PHP code. This is removed in PHP 7.0+. Use preg_replace_callback()
      instead.
    languages: [php]
    severity: ERROR
    metadata:
      cwe: ["CWE-95"]
      owasp: ["A03:2021"]
      confidence: HIGH

  # --- Python subprocess without absolute path ---

  - id: python.security.cmdi.subprocess-relative-path
    patterns:
      - pattern-either:
          - pattern: subprocess.run([$CMD, ...], ...)
          - pattern: subprocess.Popen([$CMD, ...], ...)
      - metavariable-regex:
          metavariable: $CMD
          regex: "^[a-zA-Z][a-zA-Z0-9_-]*$"
    message: >
      Subprocess called with relative command name. If PATH is manipulated,
      an attacker may substitute a malicious binary. Use absolute paths
      for system commands.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: ["CWE-426"]
      confidence: MEDIUM

  # --- Go Unvalidated Redirect via r.URL.Query ---

  - id: go.security.open-redirect.query-param
    patterns:
      - pattern-either:
          - pattern: http.Redirect($W, $R, $R.URL.Query().Get(...), ...)
          - pattern: http.Redirect($W, $R, $R.FormValue(...), ...)
    message: >
      Redirect using URL from query parameter or form value enables open
      redirect. Validate the destination URL against an allowlist of
      trusted domains.
    languages: [go]
    severity: ERROR
    metadata:
      cwe: ["CWE-601"]
      owasp: ["A01:2021"]
      confidence: HIGH
    options:
      symbolic_propagation: true
    paths:
      exclude:
        - "*_test.go"
