rules:
  # =======================================================
  # ADVANCED SECURITY RULES
  # Covers: JavaScript, TypeScript, Python, Go, PHP
  # Complements default.yaml — no overlapping rule IDs
  # =======================================================

  # =======================================================
  # 1. SQL Injection — Advanced Patterns
  # =======================================================

  - id: javascript.security.sqli.template-literal
    pattern-regex: "(?:query|execute|raw|sequelize\\.query|knex\\.raw)\\s*\\(\\s*`[^`]*\\$\\{"
    message: >
      SQL query built with template literal interpolation. Template literals
      with ${...} are just as dangerous as string concatenation for SQL injection.
      Use parameterized queries with placeholder arguments.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: ["CWE-89"]
      owasp: ["A03:2021"]
      confidence: HIGH

  - id: python.security.sqli.format-string
    patterns:
      - pattern-either:
          - pattern: $DB.execute($X.format(...))
          - pattern: $DB.execute($X % (...))
          - pattern: cursor.execute($X.format(...))
          - pattern: cursor.execute($X % (...))
      - pattern-not: cursor.execute($X, (...))
      - pattern-not: $DB.execute($X, (...))
    message: >
      SQL query built with str.format() or % formatting. These are vulnerable
      to SQL injection. Use parameterized queries with placeholder arguments.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-89"]
      owasp: ["A03:2021"]
      confidence: HIGH
    options:
      symbolic_propagation: true
    paths:
      exclude:
        - "**/__tests__/**"
        - "**/test/**"
        - "**/tests/**"

  - id: go.security.sqli.sprintf-query
    pattern: |
      $DB.Query(fmt.Sprintf($FMT, ...), ...)
    message: >
      SQL query built with fmt.Sprintf is vulnerable to SQL injection.
      Use parameterized queries: db.Query("SELECT ... WHERE id = ?", id).
    languages: [go]
    severity: ERROR
    metadata:
      cwe: ["CWE-89"]
      owasp: ["A03:2021"]
      confidence: HIGH

  - id: go.security.sqli.sprintf-exec
    pattern: |
      $DB.Exec(fmt.Sprintf($FMT, ...), ...)
    message: >
      SQL statement built with fmt.Sprintf is vulnerable to SQL injection.
      Use parameterized queries with placeholder arguments.
    languages: [go]
    severity: ERROR
    metadata:
      cwe: ["CWE-89"]
      owasp: ["A03:2021"]
      confidence: HIGH

  - id: python.security.sqli.orm-raw-query
    patterns:
      - pattern-either:
          - pattern: $MODEL.objects.raw($X + ...)
          - pattern: $MODEL.objects.raw(f"...")
          - pattern: $MODEL.objects.extra(where=[$X + ...])
          - pattern: connection.cursor().execute($X + ...)
      - pattern-not: $MODEL.objects.raw($X, [...])
    message: >
      Django ORM raw query with string concatenation or f-string. Even when
      using an ORM, raw queries must use parameterized arguments.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-89"]
      owasp: ["A03:2021"]
      confidence: HIGH
    options:
      symbolic_propagation: true

  - id: php.security.sqli.pdo-interpolation
    patterns:
      - pattern-either:
          - pattern: $PDO->query("...$VAR...")
          - pattern: $PDO->exec("...$VAR...")
          - pattern: $STMT = $PDO->prepare("..." . $INPUT . "...")
    message: >
      SQL query with variable interpolation or concatenation in PDO call.
      Use prepared statements with bound parameters via prepare() and execute().
    languages: [php]
    severity: ERROR
    metadata:
      cwe: ["CWE-89"]
      owasp: ["A03:2021"]
      confidence: HIGH

  # =======================================================
  # 2. XSS — Advanced Patterns
  # =======================================================

  - id: javascript.security.xss.outerhtml
    pattern: |
      $X.outerHTML = ...
    message: >
      Setting outerHTML with dynamic data can lead to XSS. Use safe DOM
      APIs like textContent or createElement with proper escaping.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: ["CWE-79"]
      owasp: ["A03:2021"]
      confidence: HIGH

  - id: javascript.security.xss.insertadjacenthtml
    pattern: |
      $X.insertAdjacentHTML($POS, $DATA)
    message: >
      insertAdjacentHTML() inserts raw HTML and can lead to XSS if data
      is user-controlled. Use textContent or a sanitization library like DOMPurify.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: ["CWE-79"]
      owasp: ["A03:2021"]
      confidence: MEDIUM

  - id: javascript.security.xss.response-write
    patterns:
      - pattern-either:
          - pattern: $RES.write($INPUT + ...)
          - pattern: $RES.send("<..." + $INPUT + "...")
      - pattern-not: $RES.send(JSON.stringify(...))
    message: >
      Writing user input directly to HTTP response may cause reflected XSS.
      Use a template engine with auto-escaping or explicitly escape output.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: ["CWE-79"]
      owasp: ["A03:2021"]
      confidence: MEDIUM
    options:
      symbolic_propagation: true

  - id: go.security.xss.write-response
    patterns:
      - pattern-either:
          - pattern: $W.Write([]byte($INPUT))
          - pattern: io.WriteString($W, $INPUT)
    message: >
      Writing user input directly to HTTP ResponseWriter without escaping
      may cause XSS. Use html/template or html.EscapeString().
    languages: [go]
    severity: WARNING
    metadata:
      cwe: ["CWE-79"]
      owasp: ["A03:2021"]
      confidence: MEDIUM

  - id: php.security.xss.printf
    patterns:
      - pattern-either:
          - pattern: printf("...", $INPUT)
          - pattern: sprintf("...", $INPUT)
    message: >
      Outputting user input in HTML context without escaping. Use
      htmlspecialchars($input, ENT_QUOTES, 'UTF-8') before output.
    languages: [php]
    severity: WARNING
    metadata:
      cwe: ["CWE-79"]
      owasp: ["A03:2021"]
      confidence: MEDIUM

  - id: python.security.xss.flask-markup
    patterns:
      - pattern-either:
          - pattern: Markup($INPUT)
          - pattern: Markup($X + $INPUT)
    message: >
      Flask Markup() marks strings as safe HTML, bypassing auto-escaping.
      If $INPUT contains user data, this creates an XSS vulnerability.
      Use Markup.escape() on user input before wrapping in Markup().
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-79"]
      owasp: ["A03:2021"]
      confidence: HIGH

  # =======================================================
  # 3. Command Injection — Advanced Patterns
  # =======================================================

  - id: python.security.cmdi.os-popen
    patterns:
      - pattern-either:
          - pattern: os.popen($CMD + ...)
          - pattern: os.popen($CMD.format(...))
    message: >
      os.popen() with user-controlled input enables command injection.
      Use subprocess.run() with a list of arguments instead.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-78"]
      owasp: ["A03:2021"]
      confidence: HIGH
    options:
      symbolic_propagation: true

  - id: javascript.security.cmdi.child-process-template
    pattern-regex: "(?:execSync|spawnSync)\\s*\\(\\s*`[^`]*\\$\\{"
    message: >
      Shell command built with template literal interpolation in child_process call.
      Use execFile or spawn with an argument array to prevent command injection.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: ["CWE-78"]
      owasp: ["A03:2021"]
      confidence: HIGH

  - id: php.security.cmdi.backtick
    pattern-regex: "`[^`]*\\$[a-zA-Z_]"
    message: >
      PHP backtick operator with variable interpolation runs shell commands.
      This is equivalent to shell_exec() and is vulnerable to command injection.
      Use escapeshellarg() or avoid shell commands entirely.
    languages: [php]
    severity: ERROR
    metadata:
      cwe: ["CWE-78"]
      owasp: ["A03:2021"]
      confidence: HIGH

  - id: php.security.cmdi.proc-open
    pattern: |
      proc_open($CMD, ...)
    message: >
      proc_open() runs a command and opens file pointers for I/O.
      Ensure command arguments are properly escaped with escapeshellarg()
      or use a safer alternative.
    languages: [php]
    severity: WARNING
    metadata:
      cwe: ["CWE-78"]
      owasp: ["A03:2021"]
      confidence: MEDIUM

  - id: go.security.cmdi.variable-command
    pattern: |
      exec.Command($CMD, ...)
    message: >
      exec.Command with a variable command name may allow command injection
      if the command or arguments are user-controlled. Validate command
      names against an allowlist.
    languages: [go]
    severity: WARNING
    metadata:
      cwe: ["CWE-78"]
      owasp: ["A03:2021"]
      confidence: MEDIUM

  # =======================================================
  # 4. Path Traversal — Advanced Patterns
  # =======================================================

  - id: javascript.security.path-traversal.path-join-input
    patterns:
      - pattern-either:
          - pattern: $FS.readFileSync(path.join(..., $INPUT), ...)
          - pattern: $FS.readFile(path.join(..., $INPUT), ...)
          - pattern: $FS.writeFileSync(path.join(..., $INPUT), ...)
          - pattern: $FS.createReadStream(path.join(..., $INPUT))
      - pattern-not: $FS.readFileSync(path.join(..., "..."), ...)
      - pattern-not: $FS.readFile(path.join(..., "..."), ...)
    message: >
      path.join() does not prevent path traversal. Input like "../../../etc/passwd"
      passes through path.join unchanged. Validate that the resolved path
      is within the intended directory using path.resolve() and startsWith().
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: ["CWE-22"]
      owasp: ["A01:2021"]
      confidence: MEDIUM
    options:
      symbolic_propagation: true

  - id: python.security.path-traversal.pathlib-user-input
    patterns:
      - pattern-either:
          - pattern: Path($BASE / $INPUT).read_text()
          - pattern: Path($BASE / $INPUT).read_bytes()
          - pattern: Path($BASE / $INPUT).open(...)
          - pattern: pathlib.Path($INPUT).read_text()
    message: >
      File path constructed with user input may allow path traversal.
      Resolve the path and verify it starts with the intended base directory.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-22"]
      owasp: ["A01:2021"]
      confidence: MEDIUM

  - id: go.security.path-traversal.filepath-join
    patterns:
      - pattern-either:
          - pattern: os.ReadFile(filepath.Join(..., $INPUT))
          - pattern: os.Open(filepath.Join(..., $INPUT))
          - pattern: os.Create(filepath.Join(..., $INPUT))
    message: >
      filepath.Join() does not prevent path traversal. After joining, use
      filepath.Rel() or strings.HasPrefix() with the cleaned base path
      to verify the result stays within the intended directory.
    languages: [go]
    severity: ERROR
    metadata:
      cwe: ["CWE-22"]
      owasp: ["A01:2021"]
      confidence: MEDIUM

  - id: php.security.path-traversal.include-superglobal
    patterns:
      - pattern-either:
          - pattern: include($_GET[$KEY])
          - pattern: include($_POST[$KEY])
          - pattern: include($_REQUEST[$KEY])
          - pattern: require($_GET[$KEY])
          - pattern: require($_POST[$KEY])
    message: >
      Including files based on user input ($_GET/$_POST) allows Local File
      Inclusion (LFI) and potentially Remote File Inclusion (RFI).
      Use an allowlist of permitted file names.
    languages: [php]
    severity: ERROR
    metadata:
      cwe: ["CWE-98"]
      owasp: ["A03:2021"]
      confidence: HIGH

  # =======================================================
  # 5. SSRF — Advanced Patterns
  # =======================================================

  - id: javascript.security.ssrf.http-methods
    patterns:
      - pattern-either:
          - pattern: axios($CONFIG)
          - pattern: axios.request($CONFIG)
          - pattern: $HTTP.get($URL, ...)
          - pattern: $HTTP.post($URL, ...)
          - pattern: $HTTP.put($URL, ...)
          - pattern: $HTTP.delete($URL, ...)
      - pattern-not: $HTTP.get("...", ...)
      - pattern-not: $HTTP.post("...", ...)
    message: >
      HTTP request with variable URL. If the URL is user-controlled, this
      may allow Server-Side Request Forgery (SSRF). Validate against an
      allowlist and block internal/private IP ranges (10.x, 172.16.x, 192.168.x, 127.x).
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: ["CWE-918"]
      owasp: ["A10:2021"]
      confidence: MEDIUM
    options:
      symbolic_propagation: true

  - id: python.security.ssrf.urllib-httpx
    patterns:
      - pattern-either:
          - pattern: urllib.request.urlopen($URL)
          - pattern: urllib.request.Request($URL)
          - pattern: httpx.get($URL, ...)
          - pattern: httpx.post($URL, ...)
          - pattern: aiohttp.ClientSession().get($URL)
      - pattern-not: urllib.request.urlopen("...")
      - pattern-not: httpx.get("...", ...)
    message: >
      HTTP request with variable URL may allow SSRF. Validate and allowlist
      destination URLs. Block internal and private IP ranges.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-918"]
      owasp: ["A10:2021"]
      confidence: MEDIUM
    options:
      symbolic_propagation: true

  - id: go.security.ssrf.http-newrequest
    patterns:
      - pattern-either:
          - pattern: http.NewRequest($METHOD, $URL, ...)
          - pattern: http.NewRequestWithContext($CTX, $METHOD, $URL, ...)
      - pattern-not: http.NewRequest($METHOD, "...", ...)
    message: >
      HTTP request constructed with variable URL. If the URL is user-controlled,
      this may allow SSRF. Validate against an allowlist and resolve the URL
      to verify it does not target internal infrastructure.
    languages: [go]
    severity: WARNING
    metadata:
      cwe: ["CWE-918"]
      owasp: ["A10:2021"]
      confidence: MEDIUM
    options:
      symbolic_propagation: true

  - id: php.security.ssrf.curl-variable
    patterns:
      - pattern-either:
          - pattern: curl_setopt($CH, CURLOPT_URL, $URL)
          - pattern: fopen($URL, "r")
    message: >
      HTTP request with user-controlled URL may allow SSRF. Validate and
      allowlist URLs before making requests. Block internal IP ranges.
    languages: [php]
    severity: ERROR
    metadata:
      cwe: ["CWE-918"]
      owasp: ["A10:2021"]
      confidence: MEDIUM

  # =======================================================
  # 6. Hardcoded Secrets — Advanced Patterns
  # =======================================================

  - id: generic.security.secrets.api-key-pattern
    pattern-regex: "(?:sk-[a-zA-Z0-9]{20,}|AKIA[A-Z0-9]{16}|ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36}|github_pat_[a-zA-Z0-9_]{22,})"
    message: >
      Detected a hardcoded API key or token pattern (OpenAI sk-*, AWS AKIA*,
      GitHub ghp_*/gho_*/github_pat_*). Remove from source code and use
      environment variables or a secrets manager.
    languages: [javascript, typescript, python, go, php]
    severity: ERROR
    metadata:
      cwe: ["CWE-798"]
      owasp: ["A07:2021"]
      confidence: HIGH
    paths:
      exclude:
        - "**/__tests__/**"
        - "**/test/**"
        - "**/tests/**"
        - "**/__fixtures__/**"

  - id: generic.security.secrets.connection-string
    pattern-regex: "(?:mongodb|postgres|mysql|redis|amqp)(?:ql)?://[^:]+:[^@]+@"
    message: >
      Detected a connection string with embedded credentials. Store connection
      strings in environment variables or a secrets manager. Never commit
      credentials to source control.
    languages: [javascript, typescript, python, go, php]
    severity: ERROR
    metadata:
      cwe: ["CWE-798"]
      owasp: ["A07:2021"]
      confidence: HIGH
    paths:
      exclude:
        - "**/__tests__/**"
        - "**/test/**"
        - "**/tests/**"
        - "**/__fixtures__/**"

  - id: generic.security.secrets.private-key-header
    pattern-regex: "-----BEGIN (?:RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----"
    message: >
      Detected an embedded private key in source code. Private keys must
      be stored in secure key management systems, not in source files.
    languages: [javascript, typescript, python, go, php]
    severity: ERROR
    metadata:
      cwe: ["CWE-321"]
      owasp: ["A07:2021"]
      confidence: HIGH
    paths:
      exclude:
        - "**/__tests__/**"
        - "**/test/**"
        - "**/tests/**"
        - "**/__fixtures__/**"

  - id: generic.security.secrets.jwt-secret-literal
    patterns:
      - pattern-either:
          - pattern: jwt.sign($PAYLOAD, "...", ...)
          - pattern: jwt.verify($TOKEN, "...", ...)
          - pattern: jwt.encode($PAYLOAD, "...", ...)
          - pattern: jwt.decode($TOKEN, "...", ...)
    message: >
      JWT secret is hardcoded as a string literal. Use an environment variable
      or key management service for JWT signing secrets.
    languages: [javascript, typescript, python]
    severity: ERROR
    metadata:
      cwe: ["CWE-798"]
      owasp: ["A07:2021"]
      confidence: HIGH

  - id: go.security.secrets.config-struct-password
    patterns:
      - pattern: |
          $VAR := &$TYPE{..., Password: "...", ...}
    message: >
      Hardcoded password in struct initialization. Use environment variables
      or a secrets manager to supply credentials at runtime.
    languages: [go]
    severity: ERROR
    metadata:
      cwe: ["CWE-798"]
      owasp: ["A07:2021"]
      confidence: HIGH

  # =======================================================
  # 7. Weak Cryptography — Advanced Patterns
  # =======================================================

  - id: python.security.crypto.des-cipher
    patterns:
      - pattern-either:
          - pattern: DES.new(...)
          - pattern: DES3.new(...)
          - pattern: ARC4.new(...)
          - pattern: Blowfish.new(...)
    message: >
      DES, 3DES, RC4, and Blowfish are deprecated ciphers. Use AES-256-GCM
      via AES.new() with MODE_GCM.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-327"]
      owasp: ["A02:2021"]
      confidence: HIGH
    fix: AES.new($KEY, AES.MODE_GCM)

  - id: go.security.crypto.sha1-sum
    pattern: |
      sha1.Sum(...)
    message: >
      SHA1 is cryptographically broken and should not be used for security
      purposes. Use sha256.Sum256() or stronger.
    languages: [go]
    severity: ERROR
    metadata:
      cwe: ["CWE-328"]
      owasp: ["A02:2021"]
      confidence: HIGH
    fix: sha256.Sum256(...)

  - id: go.security.crypto.md5-new
    pattern: |
      md5.New()
    message: >
      MD5 is cryptographically broken. Use sha256.New() or stronger
      for integrity checks. Use bcrypt or argon2 for passwords.
    languages: [go]
    severity: ERROR
    metadata:
      cwe: ["CWE-328"]
      owasp: ["A02:2021"]
      confidence: HIGH
    fix: sha256.New()

  - id: php.security.crypto.mt-rand
    pattern: |
      mt_rand(...)
    message: >
      mt_rand() uses the Mersenne Twister algorithm which is not
      cryptographically secure. Use random_int() or random_bytes()
      for security-sensitive values.
    languages: [php]
    severity: WARNING
    metadata:
      cwe: ["CWE-330"]
      owasp: ["A02:2021"]
      confidence: MEDIUM
    fix: random_int(...)

  - id: javascript.security.crypto.weak-pbkdf2-iterations
    pattern-regex: "pbkdf2(?:Sync)?\\([^)]*,\\s*(?:[1-9]\\d{0,3}|[1-4]\\d{4}|50000)\\s*[,)]"
    message: >
      PBKDF2 with fewer than 100,000 iterations is insufficient for password
      hashing. Use at least 600,000 iterations (OWASP 2023) or switch to
      bcrypt/argon2.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: ["CWE-916"]
      owasp: ["A02:2021"]
      confidence: MEDIUM

  # =======================================================
  # 8. Insecure Deserialization — Advanced Patterns
  # =======================================================

  - id: python.security.deserialization.shelve-open
    pattern: |
      shelve.open(...)
    message: >
      shelve.open() uses pickle internally and can run arbitrary code
      when loading untrusted data. Use a safe serialization format like JSON.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-502"]
      owasp: ["A08:2021"]
      confidence: HIGH
    paths:
      exclude:
        - "**/__tests__/**"
        - "**/test/**"
        - "**/tests/**"

  - id: python.security.deserialization.marshal-loads
    pattern: |
      marshal.loads(...)
    message: >
      marshal.loads() can run arbitrary code when deserializing untrusted
      data. Use JSON or another safe serialization format.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-502"]
      owasp: ["A08:2021"]
      confidence: HIGH

  - id: javascript.security.deserialization.node-serialize
    patterns:
      - pattern-either:
          - pattern: serialize.unserialize(...)
          - pattern: $MOD.unserialize(...)
    message: >
      node-serialize unserialize() can run arbitrary code via crafted
      serialized objects containing function expressions.
      Use JSON.parse() for data deserialization.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: ["CWE-502"]
      owasp: ["A08:2021"]
      confidence: HIGH

  - id: php.security.deserialization.unserialize-user-input
    patterns:
      - pattern-either:
          - pattern: unserialize($_GET[$KEY])
          - pattern: unserialize($_POST[$KEY])
          - pattern: unserialize($_REQUEST[$KEY])
          - pattern: unserialize($_COOKIE[$KEY])
    message: >
      Calling unserialize() on user input directly from superglobals enables
      PHP Object Injection attacks. Use json_decode() for data interchange.
    languages: [php]
    severity: ERROR
    metadata:
      cwe: ["CWE-502"]
      owasp: ["A08:2021"]
      confidence: HIGH

  - id: go.security.deserialization.gob-decode
    pattern: |
      gob.NewDecoder($INPUT).Decode(...)
    message: >
      Decoding untrusted data with gob may lead to unexpected behavior or
      denial of service. Validate and restrict the types that can be decoded.
    languages: [go]
    severity: WARNING
    metadata:
      cwe: ["CWE-502"]
      owasp: ["A08:2021"]
      confidence: MEDIUM

  # =======================================================
  # 9. Open Redirect — Advanced Patterns
  # =======================================================

  - id: javascript.security.open-redirect.location-assign
    patterns:
      - pattern-either:
          - pattern: window.location.assign($URL)
          - pattern: window.location.replace($URL)
          - pattern: document.location = $URL
          - pattern: document.location.href = $URL
    message: >
      Assigning user-controlled values to document.location or calling
      window.location.assign/replace enables open redirect attacks.
      Validate redirect URLs against a trusted domain allowlist.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: ["CWE-601"]
      owasp: ["A01:2021"]
      confidence: MEDIUM

  - id: python.security.open-redirect.flask-redirect-request
    patterns:
      - pattern-either:
          - pattern: redirect(request.args.get(...))
          - pattern: redirect(request.form.get(...))
          - pattern: redirect(request.args[...])
    message: >
      Flask redirect with URL from request parameters enables open redirect.
      Validate the redirect URL or use url_for() for internal redirects.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-601"]
      owasp: ["A01:2021"]
      confidence: HIGH
    options:
      symbolic_propagation: true

  - id: python.security.open-redirect.django-httpresponse
    pattern: |
      HttpResponseRedirect($URL)
    message: >
      Django HttpResponseRedirect with user-controlled URL may allow open
      redirect. Validate the URL against trusted domains or use reverse()
      for internal redirects.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: ["CWE-601"]
      owasp: ["A01:2021"]
      confidence: MEDIUM

  - id: go.security.open-redirect.header-location
    pattern: |
      $W.Header().Set("Location", $URL)
    message: >
      Setting Location header with user-controlled URL enables open redirect.
      Validate the URL against a trusted domain allowlist.
    languages: [go]
    severity: WARNING
    metadata:
      cwe: ["CWE-601"]
      owasp: ["A01:2021"]
      confidence: MEDIUM

  # =======================================================
  # 10. Sensitive Data Exposure — Advanced Patterns
